services:
  db:
    image: postgres:15
    container_name: scheduling_db
    restart: always
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: scheduling_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_admin -d scheduling_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: scheduling_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://user_admin:password123@db:5432/scheduling_system?schema=public"
      JWT_SECRET: "sua_chave_secreta_aqui"
      SIGNUP_SECRET: "troque-esta-chave-por-uma-segura"
      NODE_ENV: "development"
    volumes:
      - ./api:/app
      - /app/node_modules
      - /app/node_modules/.prisma
    command: sh -c "npx prisma migrate deploy && npm run dev"
    depends_on:
      db:
        condition: service_healthy

  app:
    build: ./app
    container_name: scheduling_app
    ports:
      - "8080:3000"
    volumes:
      - ./app:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - api

volumes:
  postgres_data: